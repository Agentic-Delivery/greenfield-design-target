name: Pages — test, build & deploy (expense-tracker)

# Single pipeline that publishes the expense-tracker app in ONE GitHub Pages deploy:
#   /expenses/   — the approved expense-tracker main screen, a self-contained static
#                  page (inline CSS + inline JS + Google Fonts, no build step) served
#                  verbatim from web/expenses/index.html (the Foxglove/cadence/pricing
#                  static-page precedent).
#
# This tree was reset to greenfield (commit 4afba05): the prior web/** frontend and
# scripts/verify-pages-deploy.sh were removed, so the older-demo routes
# (tide-now / foxglove / saltmarsh / cadence / pricing) no longer have sources and are
# NOT published here. This workflow was reconciled to build the ONE route this tree now
# serves, without referencing any removed input.
#
# GitHub Pages keeps only the most recent deployment, so there must be exactly ONE
# Pages-deploy job — two Pages-deploy workflows would clobber each other.
#
# Topology B (trunk-based): PR = CI only; merge to main = CI + CD to Pages +
# post-deploy content-verify. (Topology undocumented in a SAD — see issue #17.)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One concurrent deploy per branch; cancel in-progress runs on new push.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 0. Docs-only bypass — skip substantive jobs when only docs/** + root *.md change.
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi
          SKIP=true
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              docs/*) ;;                # requirement artifacts live under docs/**
              */*) SKIP=false; break ;; # nested path outside docs/ = code change
              *.md) ;;                  # root-level *.md (CLAUDE.md, README.md)
              *) SKIP=false; break ;;   # root-level non-md
            esac
          done <<< "$CHANGED"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "docs-only skip=$SKIP"

  # ── 1. Fidelity + pipeline-topology guard (branch-protection required check).
  #      No build step — the app is a self-contained static page served verbatim, so
  #      "Test & Build" validates that the served source is byte-identical to the
  #      approved mockup, carries the approved content/behaviour markers, and that this
  #      workflow's topology is sound (single deploy, no removed inputs, content-verify).
  test-build:
    name: Test & Build
    needs: detect-changes
    if: needs.detect-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify expense-tracker fidelity + pipeline topology
        run: bash scripts/verify-expense-tracker.sh

      # Small-caption contrast guard (issue #54): the served page's small captions must
      # clear the 4.5:1 WCAG small-text floor in light AND dark mode, and stay darker
      # than the preserved larger-secondary muted tier. Self-validating maths (--selftest
      # asserts the known #767676-on-white = 4.54:1 reference before it runs the file).
      - name: Verify small-caption contrast (WCAG 2.1 AA small-text floor)
        run: |
          python3 scripts/verify-caption-contrast.py --selftest
          python3 scripts/verify-caption-contrast.py

  # ── 2. Single Pages deploy — stage the expense-tracker app, publish once (push to main).
  deploy:
    name: Deploy to GitHub Pages
    needs: [detect-changes, test-build]
    if: needs.detect-changes.outputs.skip != 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Stage the expense-tracker app
        run: |
          mkdir -p _pages/expenses
          # expenses: the approved expense-tracker main screen, a self-contained static
          # page (inline CSS + inline JS + Google Fonts, no build). Served verbatim at
          # the /expenses/ subpath.
          cp web/expenses/index.html _pages/expenses/index.html
          # Root index: redirect to /expenses/ (the only app on this reset tree).
          cat > _pages/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0;url=expenses/">
          <title>Redirecting…</title></head>
          <body><a href="expenses/">Expense tracker</a></body></html>
          REDIRECT
          echo "Staged:"; find _pages -type f | sort

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4

  # ── 3. Post-deploy content verification — assert deployed CONTENT, not a bare 2xx.
  verify:
    name: Verify deployed content
    needs: [detect-changes, deploy]
    if: needs.detect-changes.outputs.skip != 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PAGES_ORIGIN: https://agentic-delivery.github.io
      EXPENSES_PATH: /greenfield-design-target/expenses/
    steps:
      - name: Expense-tracker screen live (content + approved clay accent token)
        run: |
          URL="${PAGES_ORIGIN}${EXPENSES_PATH}"
          echo "Probing $URL ..."
          BODY=$(curl -sSL --retry 6 --retry-delay 10 --retry-all-errors --max-time 30 "$URL")

          # 1) The approved expense-tracker content (not a redirect, not another app,
          #    not a 404). Assert one marker from each approved component + the empty state.
          for MARKER in \
            'Ledger' \
            'Spent this month' \
            'Add an expense' \
            'Recent' \
            'Nothing logged yet'; do
            if ! grep -qF "$MARKER" <<< "$BODY"; then
              echo "FAIL: approved marker '$MARKER' not found at $URL — wrong app / redirect / 404?"
              exit 1
            fi
          done

          # 2) The add-expense behaviour ships (the inline handler must be present — the
          #    page is a live app, not a static shell).
          if ! grep -qF "addEventListener('submit'" <<< "$BODY"; then
            echo "FAIL: inline add-expense handler not in served page — app not live (dead shell?)"
            exit 1
          fi

          # 3) Fidelity: the approved design ships its OKLCH Marginalia clay accent token
          #    inline. Its presence proves the approved design shipped (and this slot is
          #    not serving another app).
          if ! grep -qF 'oklch(0.55 0.106 41)' <<< "$BODY"; then
            echo "FAIL: clay accent token oklch(0.55 0.106 41) not in served page — approved design not live"
            exit 1
          fi
          echo "PASS: expense-tracker screen is live at $URL"

  # ── 4. Aggregate observability gate (branch-protection required check).
  ci-status:
    name: CI status
    needs: [detect-changes, test-build, deploy, verify]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check no job failed or was cancelled
        run: |
          RESULTS=( \
            "detect-changes=${{ needs.detect-changes.result }}" \
            "test-build=${{ needs.test-build.result }}" \
            "deploy=${{ needs.deploy.result }}" \
            "verify=${{ needs.verify.result }}" )
          echo "${RESULTS[@]}"
          for R in "${RESULTS[@]}"; do
            CONCLUSION="${R#*=}"
            if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "FAIL: ${R%%=*} did not pass (skipped on docs-only / PR is expected)"
              exit 1
            fi
          done
          echo "PASS: all jobs passed or were skipped"
